<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arwanda — Time Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0c0c0e;
  --bg2: #131316;
  --bg3: #1a1a1f;
  --surface: #1e1e24;
  --surface2: #26262e;
  --border: #2e2e38;
  --border2: #3a3a48;
  --text: #f0efe8;
  --text2: #9897a0;
  --text3: #5c5b65;
  --accent: #c8f05a;
  --accent2: #a8d040;
  --accent-dim: rgba(200,240,90,0.12);
  --accent-dim2: rgba(200,240,90,0.06);
  --red: #ff6b6b;
  --red-dim: rgba(255,107,107,0.12);
  --amber: #fbbf24;
  --teal: #5eead4;
  --radius: 10px;
  --radius-lg: 16px;
  --radius-xl: 24px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.6; }
body::after { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.25; pointer-events: none; z-index: 0; }
.app { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 0 24px 80px; }
.site-header { display: flex; align-items: center; justify-content: space-between; padding: 32px 0 48px; border-bottom: 1px solid var(--border); margin-bottom: 48px; }
.logo { display: flex; align-items: baseline; gap: 10px; }
.logo-name { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; }
.logo-tag { font-size: 11px; color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(200,240,90,0.25); padding: 3px 10px; border-radius: 99px; letter-spacing: 0.08em; text-transform: uppercase; }
.header-right { display: flex; align-items: center; gap: 16px; }
.sync-status { font-size: 11px; display: flex; align-items: center; gap: 6px; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
.sync-dot.ok { background: var(--accent); }
.sync-dot.err { background: var(--red); }
.sync-dot.syncing { background: var(--amber); animation: blink 1s infinite; }
.header-time { font-size: 12px; color: var(--text3); text-align: right; line-height: 1.6; }
.nav { display: flex; gap: 2px; margin-bottom: 36px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; }
.nav-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text2); font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.05em; cursor: pointer; border-radius: 7px; transition: all 0.2s; text-transform: uppercase; }
.nav-btn:hover { color: var(--text); background: var(--surface); }
.nav-btn.active { background: var(--surface2); color: var(--accent); border: 1px solid var(--border2); }
.view { display: none; animation: fadeIn 0.3s ease; }
.view.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.timer-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 40px; margin-bottom: 20px; position: relative; overflow: hidden; }
.timer-card::before { content: ''; position: absolute; top: -60px; right: -60px; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(200,240,90,0.07) 0%, transparent 70%); pointer-events: none; }
.timer-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 36px; }
.field { display: flex; flex-direction: column; gap: 8px; }
.field label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
.field input, .field select { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
.field input:focus, .field select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,240,90,0.08); }
.field select option { background: var(--bg3); }
.field.full { grid-column: 1 / -1; }
.clock-area { text-align: center; padding: 20px 0 32px; }
.clock-status { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 20px; }
.pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); transition: background 0.3s; }
.pulse-dot.running { background: var(--accent); animation: blink 1.4s ease-in-out infinite; }
.clock-time { font-family: 'Fraunces', serif; font-size: 72px; font-weight: 300; letter-spacing: -3px; color: var(--text); line-height: 1; margin-bottom: 10px; font-variant-numeric: tabular-nums; transition: color 0.3s; }
.clock-time.running { color: var(--accent); }
.clock-meta { font-size: 12px; color: var(--text3); min-height: 18px; }
.btn-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
.btn-primary { display: inline-flex; align-items: center; gap: 10px; padding: 14px 40px; background: var(--accent); color: #0c0c0e; border: none; border-radius: var(--radius); font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s; }
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(200,240,90,0.2); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-stop { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,107,107,0.3); padding: 14px 40px; border-radius: var(--radius); font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: none; align-items: center; gap: 10px; }
.btn-stop:hover { background: rgba(255,107,107,0.18); transform: translateY(-1px); }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); padding: 10px 20px; border-radius: var(--radius); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.2s; }
.btn-ghost:hover { border-color: var(--border2); color: var(--text); background: var(--surface); }
.manual-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-top: 16px; display: none; }
.manual-panel.show { display: block; animation: fadeIn 0.25s ease; }
.manual-panel h3 { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 18px; }
.manual-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 32px; }
.metric { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; transition: border-color 0.2s; }
.metric:hover { border-color: var(--border2); }
.metric-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }
.metric-value { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 300; color: var(--text); letter-spacing: -1px; line-height: 1; }
.metric-unit { font-size: 12px; color: var(--text3); margin-top: 6px; }
.metric-accent { border-color: rgba(200,240,90,0.3); }
.metric-accent .metric-value { color: var(--accent); }
.log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.log-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 300; color: var(--text); }
.log-count { font-size: 11px; color: var(--text3); margin-left: 8px; }
.btn-export { display: inline-flex; align-items: center; gap: 8px; padding: 9px 18px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius); color: var(--text2); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s; }
.btn-export:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim2); }
.table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead tr { background: var(--bg3); border-bottom: 1px solid var(--border); }
th { padding: 12px 16px; text-align: left; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); font-weight: 500; }
td { padding: 14px 16px; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr { transition: background 0.15s; }
tbody tr:hover { background: var(--surface); }
.td-project { color: var(--text); font-weight: 500; }
.td-desc { font-size: 11px; color: var(--text3); margin-top: 3px; }
.cat-pill { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 500; }
.cat-dev { background: rgba(94,234,212,0.12); color: var(--teal); }
.cat-design { background: rgba(200,240,90,0.12); color: var(--accent); }
.cat-meet { background: rgba(251,191,36,0.1); color: var(--amber); }
.cat-res { background: rgba(168,85,247,0.12); color: #c084fc; }
.cat-admin { background: var(--surface2); color: var(--text2); }
.cat-other { background: var(--surface2); color: var(--text2); }
.dur-badge { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 300; color: var(--text); }
.btn-del { background: transparent; border: none; color: var(--text3); cursor: pointer; padding: 6px; border-radius: 6px; transition: all 0.2s; font-size: 14px; line-height: 1; }
.btn-del:hover { background: var(--red-dim); color: var(--red); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }
.empty-state p { font-size: 13px; }
.sum-section-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 300; color: var(--text); margin-bottom: 20px; }
.cat-bars { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }
.cat-row { margin-bottom: 18px; }
.cat-row:last-child { margin-bottom: 0; }
.cat-row-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; }
.cat-name { color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; font-size: 11px; }
.cat-dur { color: var(--text); font-family: 'Fraunces', serif; font-size: 16px; font-weight: 300; }
.cat-pct { color: var(--text3); font-size: 11px; }
.bar-track { height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.footer { text-align: center; padding: 40px 0 0; font-size: 11px; color: var(--text3); letter-spacing: 0.05em; border-top: 1px solid var(--border); margin-top: 48px; }
.footer span { color: var(--text2); }
.toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px 24px; font-size: 12px; color: var(--text); z-index: 999; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); letter-spacing: 0.03em; }
.toast.show { transform: translateX(-50%) translateY(0); }
.loading-row td { text-align: center; color: var(--text3); padding: 40px; font-size: 12px; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
@media (max-width: 600px) {
  .metrics { grid-template-columns: repeat(2,1fr); }
  .timer-inputs { grid-template-columns: 1fr; }
  .manual-grid { grid-template-columns: 1fr 1fr; }
  .clock-time { font-size: 52px; }
  .header-right { flex-direction: column; align-items: flex-end; gap: 6px; }
}
</style>
</head>
<body>
<div class="app">
  <header class="site-header">
    <div class="logo">
      <span class="logo-name">Arwanda</span>
      <span class="logo-tag">Time Tracker</span>
    </div>
    <div class="header-right">
      <div class="sync-status">
        <span class="sync-dot" id="sync-dot"></span>
        <span id="sync-label" style="font-size:11px;color:var(--text3);">connecting...</span>
      </div>
      <div class="header-time">
        <div id="lc-time" style="font-size:15px;font-weight:500;letter-spacing:0.02em;"></div>
        <div id="lc-date" style="font-size:11px;margin-top:2px;"></div>
      </div>
    </div>
  </header>

  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('tracker',this)">⏱ Timer</button>
    <button class="nav-btn" onclick="switchTab('log',this)">☰ Log</button>
    <button class="nav-btn" onclick="switchTab('summary',this)">◎ Summary</button>
  </nav>

  <!-- TRACKER -->
  <div id="view-tracker" class="view active">
    <div class="timer-card">
      <div class="timer-inputs">
        <div class="field">
          <label>Project / Task</label>
          <input type="text" id="inp-project" placeholder="What are you working on?" />
        </div>
        <div class="field">
          <label>Category</label>
          <select id="inp-category">
            <option value="Development">Development</option>
            <option value="Design">Design</option>
            <option value="Meeting">Meeting</option>
            <option value="Research">Research</option>
            <option value="Admin">Admin</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="field full">
          <label>Description (optional)</label>
          <input type="text" id="inp-desc" placeholder="Brief description of the work..." />
        </div>
      </div>
      <div class="clock-area">
        <div class="clock-status">
          <span class="pulse-dot" id="pulse-dot"></span>
          <span id="status-text">Ready to track</span>
        </div>
        <div class="clock-time" id="clock-time">00:00:00</div>
        <div class="clock-meta" id="clock-meta"></div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="btn-start" onclick="startTimer()">▶ &nbsp;Start Timer</button>
        <button class="btn-stop" id="btn-stop" onclick="stopTimer()">■ &nbsp;Stop & Save</button>
        <button class="btn-ghost" onclick="toggleManual()">Manual entry</button>
      </div>
    </div>
    <div class="manual-panel" id="manual-panel">
      <h3>Manual Time Entry</h3>
      <div class="manual-grid">
        <div class="field"><label>Date</label><input type="date" id="m-date" /></div>
        <div class="field"><label>Start Time</label><input type="time" id="m-start" /></div>
        <div class="field"><label>End Time</label><input type="time" id="m-end" /></div>
      </div>
      <button class="btn-primary" style="padding:11px 28px;font-size:12px;" onclick="addManual()">+ &nbsp;Add Entry</button>
    </div>
  </div>

  <!-- LOG -->
  <div id="view-log" class="view">
    <div class="log-header">
      <div>
        <span class="log-title">Work Log</span>
        <span class="log-count" id="log-count-label">0 entries</span>
      </div>
      <button class="btn-export" onclick="exportCSV()">↓ &nbsp;Export to CSV</button>
    </div>
    <div class="table-wrap">
      <div id="log-container">
        <div class="empty-state"><div class="empty-icon">◷</div><p>Loading sessions...</p></div>
      </div>
    </div>
  </div>

  <!-- SUMMARY -->
  <div id="view-summary" class="view">
    <div class="metrics">
      <div class="metric metric-accent">
        <div class="metric-label">Today</div>
        <div class="metric-value" id="sum-today-h">0</div>
        <div class="metric-unit" id="sum-today-m">hours tracked</div>
      </div>
      <div class="metric">
        <div class="metric-label">This Week</div>
        <div class="metric-value" id="sum-week-h">0</div>
        <div class="metric-unit" id="sum-week-m">hours tracked</div>
      </div>
      <div class="metric">
        <div class="metric-label">All Time</div>
        <div class="metric-value" id="sum-total-h">0</div>
        <div class="metric-unit" id="sum-total-m">hours total</div>
      </div>
      <div class="metric">
        <div class="metric-label">Sessions</div>
        <div class="metric-value" id="sum-sessions">0</div>
        <div class="metric-unit">recorded</div>
      </div>
    </div>
    <div class="sum-section-title">By Category</div>
    <div class="cat-bars" id="cat-bars"><div class="empty-state" style="padding:30px 20px;"><p>No data yet.</p></div></div>
  </div>

  <footer class="footer"><p>Arwanda — <span>your personal time tracker</span></p></footer>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://bhktjvbndzefshhuupqz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_7cHI1Kt_DIGhaSznXPDGkQ_pe1DbK9W';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let logs = [];
let timerInterval = null;
let startTs = null;

// ── Live clock ──
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('lc-time').textContent = h+':'+m+':'+s;
  document.getElementById('lc-date').textContent = now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}
updateClock(); setInterval(updateClock, 1000);

// ── Helpers ──
function pad(n) { return String(n).padStart(2,'0'); }
function fmtSecs(s) { return pad(Math.floor(s/3600))+':'+pad(Math.floor((s%3600)/60))+':'+pad(s%60); }
function fmtHM(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  if (h > 0 && m > 0) return h+'h '+m+'m';
  if (h > 0) return h+'h';
  return m > 0 ? m+'m' : '0m';
}
function isoDate(d) { return d.toISOString().split('T')[0]; }
function startOfWeek() { const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-d.getDay()); return d; }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function setSyncStatus(state, label) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = label;
}

// ── Load from Supabase ──
async function loadLogs() {
  setSyncStatus('syncing', 'loading...');
  const { data, error } = await sb.from('time_logs').select('*').order('created_at', { ascending: false });
  if (error) { setSyncStatus('err', 'connection error'); toast('Failed to load data'); return; }
  logs = (data || []).map(r => ({
    id: r.id,
    project: r.project,
    cat: r.category,
    desc: r.description || '',
    date: r.date,
    startStr: r.start_time,
    endStr: r.end_time,
    dur: r.duration_sec,
    ts: new Date(r.created_at).getTime()
  }));
  setSyncStatus('ok', 'synced');
  document.getElementById('log-count-label').textContent = logs.length + (logs.length === 1 ? ' entry' : ' entries');
}

// ── Save to Supabase ──
async function saveLog(entry) {
  setSyncStatus('syncing', 'saving...');
  const { data, error } = await sb.from('time_logs').insert([{
    project: entry.project,
    category: entry.cat,
    description: entry.desc,
    date: entry.date,
    start_time: entry.startStr,
    end_time: entry.endStr,
    duration_sec: entry.dur
  }]).select().single();
  if (error) { setSyncStatus('err', 'save failed'); toast('Failed to save — check connection'); return null; }
  setSyncStatus('ok', 'saved ✓');
  return data.id;
}

// ── Delete from Supabase ──
async function deleteLog(id) {
  setSyncStatus('syncing', 'deleting...');
  const { error } = await sb.from('time_logs').delete().eq('id', id);
  if (error) { setSyncStatus('err', 'delete failed'); toast('Failed to delete'); return; }
  logs = logs.filter(l => l.id !== id);
  setSyncStatus('ok', 'synced');
  renderLog();
  toast('Entry deleted');
}

// ── Tab ──
function switchTab(tab, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  el.classList.add('active');
  if (tab === 'log') { loadLogs().then(renderLog); }
  if (tab === 'summary') { loadLogs().then(renderSummary); }
}

// ── Timer ──
function startTimer() {
  if (timerInterval) return;
  startTs = Date.now();
  document.getElementById('btn-start').style.display = 'none';
  document.getElementById('btn-stop').style.display = 'inline-flex';
  document.getElementById('pulse-dot').classList.add('running');
  document.getElementById('clock-time').classList.add('running');
  const proj = document.getElementById('inp-project').value.trim() || 'Untitled task';
  document.getElementById('status-text').textContent = 'Tracking — ' + proj;
  const d = new Date(startTs);
  document.getElementById('clock-meta').textContent = 'Started at '+pad(d.getHours())+':'+pad(d.getMinutes());
  timerInterval = setInterval(() => {
    document.getElementById('clock-time').textContent = fmtSecs(Math.floor((Date.now()-startTs)/1000));
  }, 1000);
}

async function stopTimer() {
  if (!startTs) return;
  clearInterval(timerInterval); timerInterval = null;
  const endTs = Date.now();
  const dur = Math.floor((endTs - startTs) / 1000);
  const start = new Date(startTs), end = new Date(endTs);
  const project = document.getElementById('inp-project').value.trim() || 'Untitled task';
  const cat = document.getElementById('inp-category').value;
  const desc = document.getElementById('inp-desc').value.trim();
  const entry = {
    project, cat, desc,
    date: start.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    startStr: pad(start.getHours())+':'+pad(start.getMinutes()),
    endStr: pad(end.getHours())+':'+pad(end.getMinutes()),
    dur, ts: startTs
  };
  document.getElementById('btn-stop').disabled = true;
  const newId = await saveLog(entry);
  document.getElementById('btn-stop').disabled = false;
  if (newId) { entry.id = newId; logs.unshift(entry); }
  document.getElementById('btn-start').style.display = 'inline-flex';
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('pulse-dot').classList.remove('running');
  document.getElementById('clock-time').classList.remove('running');
  document.getElementById('clock-time').textContent = '00:00:00';
  document.getElementById('status-text').textContent = 'Session saved ✓';
  document.getElementById('clock-meta').textContent = 'Duration: '+fmtHM(dur);
  document.getElementById('inp-desc').value = '';
  startTs = null;
  document.getElementById('log-count-label').textContent = logs.length + (logs.length===1?' entry':' entries');
  setTimeout(() => {
    document.getElementById('status-text').textContent = 'Ready to track';
    document.getElementById('clock-meta').textContent = '';
  }, 3000);
  toast('Session saved — '+fmtHM(dur));
}

function toggleManual() {
  const p = document.getElementById('manual-panel');
  p.classList.toggle('show');
  if (p.classList.contains('show')) document.getElementById('m-date').value = isoDate(new Date());
}

async function addManual() {
  const ms = document.getElementById('m-start').value;
  const me = document.getElementById('m-end').value;
  const md = document.getElementById('m-date').value;
  if (!ms || !me || !md) { toast('Please fill in all time fields'); return; }
  const project = document.getElementById('inp-project').value.trim() || 'Untitled task';
  const cat = document.getElementById('inp-category').value;
  const desc = document.getElementById('inp-desc').value.trim();
  const [sh,sm] = ms.split(':').map(Number);
  const [eh,em] = me.split(':').map(Number);
  let dur = ((eh*60+em)-(sh*60+sm))*60;
  if (dur < 0) dur += 86400;
  const dateObj = new Date(md+'T00:00:00');
  const dateLabel = dateObj.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const entry = { project, cat, desc, date: dateLabel, startStr: ms, endStr: me, dur, ts: dateObj.getTime() };
  const newId = await saveLog(entry);
  if (newId) { entry.id = newId; logs.unshift(entry); }
  toast('Manual entry added — '+fmtHM(dur));
  document.getElementById('manual-panel').classList.remove('show');
  document.getElementById('log-count-label').textContent = logs.length + (logs.length===1?' entry':' entries');
}

// ── Render log ──
function catClass(cat) {
  const m = { Development:'cat-dev', Design:'cat-design', Meeting:'cat-meet', Research:'cat-res', Admin:'cat-admin' };
  return m[cat] || 'cat-other';
}

function renderLog() {
  const count = logs.length;
  document.getElementById('log-count-label').textContent = count + (count===1?' entry':' entries');
  const c = document.getElementById('log-container');
  if (!count) {
    c.innerHTML = '<div class="empty-state"><div class="empty-icon">◷</div><p>No work sessions yet.<br>Start your timer to begin tracking.</p></div>';
    return;
  }
  c.innerHTML = '<table><thead><tr><th>Project</th><th>Category</th><th>Date</th><th>Start</th><th>End</th><th>Duration</th><th></th></tr></thead><tbody>' +
    logs.map(l => `<tr>
      <td><div class="td-project">${l.project}</div>${l.desc?`<div class="td-desc">${l.desc}</div>`:''}</td>
      <td><span class="cat-pill ${catClass(l.cat)}">${l.cat}</span></td>
      <td style="color:var(--text3);font-size:11px;">${l.date}</td>
      <td>${l.startStr}</td>
      <td>${l.endStr}</td>
      <td><span class="dur-badge">${fmtHM(l.dur)}</span></td>
      <td><button class="btn-del" onclick="deleteLog(${l.id})" title="Delete">×</button></td>
    </tr>`).join('') + '</tbody></table>';
}

// ── Summary ──
function renderSummary() {
  const now = new Date(); now.setHours(0,0,0,0);
  const todayStart = now.getTime();
  const weekStart = startOfWeek().getTime();
  let todaySec=0, weekSec=0, totalSec=0;
  const cats = {};
  logs.forEach(l => {
    totalSec += l.dur;
    if (l.ts >= todayStart) todaySec += l.dur;
    if (l.ts >= weekStart) weekSec += l.dur;
    cats[l.cat] = (cats[l.cat]||0) + l.dur;
  });
  document.getElementById('sum-today-h').textContent = Math.floor(todaySec/3600);
  const tm = Math.floor((todaySec%3600)/60); document.getElementById('sum-today-m').textContent = tm > 0 ? tm+' min remaining' : 'hours tracked';
  document.getElementById('sum-week-h').textContent = Math.floor(weekSec/3600);
  const wm = Math.floor((weekSec%3600)/60); document.getElementById('sum-week-m').textContent = wm > 0 ? wm+' min remaining' : 'hours tracked';
  document.getElementById('sum-total-h').textContent = Math.floor(totalSec/3600);
  const ttm = Math.floor((totalSec%3600)/60); document.getElementById('sum-total-m').textContent = ttm > 0 ? ttm+' min remaining' : 'hours total';
  document.getElementById('sum-sessions').textContent = logs.length;
  const barColors = { Development:'#5eead4', Design:'#c8f05a', Meeting:'#fbbf24', Research:'#c084fc', Admin:'#6b7280', Other:'#6b7280' };
  const cb = document.getElementById('cat-bars');
  if (!Object.keys(cats).length) { cb.innerHTML = '<div class="empty-state" style="padding:30px 20px;"><p>No data yet.</p></div>'; return; }
  const sorted = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const maxSec = sorted[0][1];
  cb.innerHTML = sorted.map(([cat, sec]) => {
    const pct = maxSec>0 ? Math.round(sec/maxSec*100) : 0;
    const totalPct = totalSec>0 ? Math.round(sec/totalSec*100) : 0;
    return `<div class="cat-row">
      <div class="cat-row-header">
        <div><span class="cat-name">${cat}</span></div>
        <div style="display:flex;align-items:baseline;gap:10px;">
          <span class="cat-dur">${fmtHM(sec)}</span>
          <span class="cat-pct">${totalPct}%</span>
        </div>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${barColors[cat]||'#6b7280'};"></div></div>
    </div>`;
  }).join('');
}

// ── Export CSV ──
function exportCSV() {
  if (!logs.length) { toast('No data to export'); return; }
  const headers = ['Project','Category','Description','Date','Start','End','Duration (min)','Duration (hrs)'];
  const rows = logs.map(l => [
    '"'+l.project.replace(/"/g,'""')+'"',
    l.cat,
    '"'+(l.desc||'').replace(/"/g,'""')+'"',
    l.date, l.startStr, l.endStr,
    Math.round(l.dur/60),
    (l.dur/3600).toFixed(2)
  ].join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'arwanda-time-log.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('CSV exported — ready for Google Sheets!');
}

// ── Init ──
loadLogs();
</script>
